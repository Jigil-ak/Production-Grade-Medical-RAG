name: Medical RAG CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Nightly cron run at 02:00 UTC for full RAGAS evaluation gate
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      dataset:
        description: 'Golden dataset path for RAGAS eval'
        required: false
        default: 'data/golden/smoke_dataset.json'

jobs:
  fast-smoke-test:
    name: Tier 1 - Fast Smoke & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Pytest Suite
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'test-key-ci' }}
          ENVIRONMENT: dev
        run: |
          pytest tests/ -v

      - name: Validate Golden Dataset Schema
        run: |
          python app/eval/validate_golden.py data/golden/smoke_dataset.json

  full-ragas-eval:
    name: Tier 2 - Nightly RAGAS Evaluation Gate
    needs: fast-smoke-test
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run RAGAS Evaluation & Quality Gate
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ENVIRONMENT: production
        run: |
          python app/eval/run_eval.py --dataset data/golden/smoke_dataset.json

      - name: Upload Evaluation Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ragas-eval-report
          path: reports/*.json
